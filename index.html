<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BATZ Такси</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', sans-serif; background-color: #111; color: #fff; overflow: hidden; }
        #map { width: 100%; height: 55%; z-index: 1; }
        
        #role-toggle-btn {
            position: absolute; top: 15px; right: 15px; z-index: 2000;
            background: #ffcc00; color: #000; border: none; padding: 10px 15px;
            border-radius: 20px; font-weight: bold; font-size: 13px; cursor: pointer;
        }

        .bottom-panel { 
            width: 100%; height: 45%; background: #1e1e1e; padding: 20px; 
            box-sizing: border-box; border-radius: 24px 24px 0 0; 
            position: absolute; bottom: 0; z-index: 1000; 
            box-shadow: 0 -5px 20px rgba(0,0,0,0.5); border-top: 2px solid #ffcc00;
            overflow-y: auto;
        }
        
        .brand-title { margin: 0; font-size: 22px; font-weight: 800; color: #ffcc00; text-align: center; }
        .role-indicator { font-size: 11px; text-align: center; color: #aaa; margin-bottom: 10px; text-transform: uppercase; }

        /* Поля ввода адресов */
        .input-group { margin-bottom: 8px; position: relative; }
        .input-group input { 
            width: 100%; padding: 11px 12px; background: #2d2d2d; border: 1px solid #444; 
            border-radius: 10px; color: #fff; font-size: 14px; box-sizing: border-box; outline: none;
        }
        .input-group input:focus { border-color: #ffcc00; }

        /* Выбор Тарифов как в Яндекс */
        .tariffs-container { display: flex; gap: 10px; margin: 12px 0; }
        .tariff-card {
            flex: 1; background: #2d2d2d; border: 2px solid #333; padding: 10px;
            border-radius: 12px; text-align: center; cursor: pointer; transition: 0.2s;
        }
        .tariff-card.active { border-color: #ffcc00; background: #3a3a26; }
        .tariff-name { font-size: 14px; font-weight: bold; color: #fff; }
        .tariff-price { font-size: 13px; color: #ffcc00; margin-top: 4px; }

        .btn-bac { 
            width: 100%; padding: 14px; background: #ffcc00; border: none; 
            border-radius: 12px; font-weight: bold; font-size: 16px; color: #000; cursor: pointer;
        }

        /* Карточка заказа для водителя */
        .order-card {
            background: #2d2d2d; border-radius: 12px; padding: 15px; border-left: 4px solid #ffcc00; margin-top: 10px;
        }
        .order-status-screen { text-align: center; padding-top: 20px; }
        .status-text { font-size: 18px; font-weight: bold; color: #ffcc00; margin-bottom: 15px; }
        
        .btn-status { width: 100%; padding: 12px; border: none; border-radius: 10px; font-weight: bold; font-size: 15px; cursor: pointer; color: #fff; margin-top: 5px; }
        .btn-green { background: #28a745; }
        .btn-blue { background: #007bff; }
        .btn-red { background: #dc3545; }
    </style>
</head>
<body>

    <button id="role-toggle-btn" onclick="toggleRole()">РЕЖИМ: ПАССАЖИР</button>
    <div id="map"></div>

    <div id="passenger-panel" class="bottom-panel">
        <div id="passenger-search-view">
            <div class="brand-title">BATZ ТАКСИ</div>
            <div class="role-indicator">Заказ поездки</div>
            
            <div class="input-group">
                <input type="text" id="from-address" placeholder="Откуда (Поиск по клику на карту...)" readonly>
            </div>
            <div class="input-group">
                <input type="text" id="to-address" placeholder="Кликните на карту, куда едем" readonly>
            </div>

            <div class="tariffs-container">
                <div class="tariff-card active" id="t-eco" onclick="selectTariff('eco', 150)">
                    <div class="tariff-name">Эконом</div>
                    <div class="tariff-price" id="price-eco">0 ₸</div>
                </div>
                <div class="tariff-card" id="t-comf" onclick="selectTariff('comf', 250)">
                    <div class="tariff-name">Комфорт</div>
                    <div class="tariff-price" id="price-comf">0 ₸</div>
                </div>
            </div>

            <button class="btn-bac" id="order-btn" onclick="passengerOrder()">Заказать BATZ</button>
        </div>

        <div id="passenger-status-view" class="order-status-screen" style="display: none;">
            <div class="status-text" id="p-status-title">Поиск свободной машины...</div>
            <div id="p-status-desc" style="color: #aaa;">Ваш заказ отправлен водителям BATZ.</div>
        </div>
    </div>

    <div id="driver-panel" class="bottom-panel" style="display: none;">
        <div class="brand-title">BATZ РАДАР</div>
        <div class="role-indicator">Кабинет Водителя</div>
        
        <div id="driver-radar-view">
            <div id="orders-list"><div style="text-align:center; color:#666; margin-top:20px;">Заказов пока нет...</div></div>
        </div>

        <div id="driver-job-view" style="display: none;">
            <div class="order-card">
                <div class="status-text" style="font-size:16px;" id="d-job-text">Вы приняли заказ</div>
                <button class="btn-status btn-blue" id="job-action-btn" onclick="changeJobStatus()">Я НА МЕСТЕ</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const socket = io('https://batz-taxi-backend.onrender.com');

        let currentRole = "passenger";
        let userLat = 52.2855;
        let userLon = 76.9410;
        let destLat = null, destLon = null;
        
        let selectedTariff = 'eco';
        let costPerKm = 150; 
        let calculatedDistance = 0;
        let currentActiveOrderId = null;
        let jobStage = 0; // 0 = едет к клиенту, 1 = на месте, 2 = в пути

        // Инициализация карты
        const map = L.map('map', { zoomControl: false }).setView([userLat, userLon], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        let userMarker = L.marker([userLat, userLon]).addTo(map);
        let routeLine = null;

        // GPS позиция
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((position) => {
                userLat = position.coords.latitude;
                userLon = position.coords.longitude;
                map.setView([userLat, userLon], 15);
                userMarker.setLatLng([userLat, userLon]);
                reverseGeocode(userLat, userLon, 'from-address');
            });
        }

        // Бесплатный перевод координат в текст через Photon API
        async function reverseGeocode(lat, lon, elementId) {
            try {
                const res = await fetch(`https://photon.komoot.io/reverse?lon=${lon}&lat=${lat}`);
                const data = await res.json();
                if(data.features && data.features.length > 0) {
                    const f = data.features[0].properties;
                    const addr = `${f.street || 'Улица'} ${f.housenumber || ''}`.trim() || "Точка на карте";
                    document.getElementById(elementId).value = addr;
                }
            } catch(e) { document.getElementById(elementId).value = `${lat.toFixed(4)}, ${lon.toFixed(4)}`; }
        }

        // Клик по карте
        map.on('click', async function(e) {
            if (currentRole !== "passenger" || currentActiveOrderId) return;

            destLat = e.latlng.lat;
            destLon = e.latlng.lng;
            reverseGeocode(destLat, destLon, 'to-address');

            const osrmUrl = `https://router.project-osrm.org/route/v1/driving/${userLon},${userLat};${destLon},${destLat}?overview=full&geometries=geojson`;
            try {
                const response = await fetch(osrmUrl);
                const data = await response.json();
                if (data.routes && data.routes.length > 0) {
                    const coords = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
                    calculatedDistance = (data.routes[0].distance / 1000);
                    
                    if (routeLine) map.removeLayer(routeLine);
                    routeLine = L.polyline(coords, { color: '#ffcc00', weight: 5 }).addTo(map);
                    map.fitBounds(routeLine.getBounds());
                    
                    // Обновляем ценники
                    document.getElementById('price-eco').innerText = `${Math.round(calculatedDistance * 150 + 400)} ₸`;
                    document.getElementById('price-comf').innerText = `${Math.round(calculatedDistance * 250 + 600)} ₸`;
                }
            } catch (err) { console.error(err); }
        });

        function selectTariff(type, cost) {
            if(currentActiveOrderId) return;
            selectedTariff = type;
            costPerKm = cost;
            document.getElementById('t-eco').classList.remove('active');
            document.getElementById('t-comf').classList.remove('active');
            document.getElementById(`t-${type}`).classList.add('active');
        }

        // Пассажир отправляет заказ
        function passengerOrder() {
            if (!destLat) { alert("Выберите место назначения на карте!"); return; }
            
            const finalPrice = Math.round(calculatedDistance * costPerKm + (selectedTariff === 'eco' ? 400 : 600));

            socket.emit('create_order', {
                from: [userLat, userLon],
                to: [destLat, destLon],
                fromText: document.getElementById('from-address').value,
                toText: document.getElementById('to-address').value,
                distance: calculatedDistance.toFixed(1),
                tariff: selectedTariff === 'eco' ? 'Эконом' : 'Комфорт',
                price: finalPrice
            });

            document.getElementById('passenger-search-view').style.display = 'none';
            document.getElementById('passenger-status-view').style.display = 'block';
        }

        // Прием заказов сервером для водителя
        socket.on('order_list_update', (orders) => {
            if (currentRole !== "driver") return;
            const list = document.getElementById('orders-list');
            if(orders.length === 0) {
                list.innerHTML = '<div style="text-align:center; color:#666; margin-top:20px;">Заказов пока нет...</div>';
                return;
            }
            list.innerHTML = '';
            orders.forEach(o => {
                list.innerHTML += `
                    <div class="order-card">
                        <div><strong>🚕 ${o.tariff} • ${o.price} ₸</strong></div>
                        <div style="font-size:13px; margin: 5px 0;">📍 А: ${o.fromText}<br>🏁 Б: ${o.toText}</div>
                        <div style="font-size:12px; color:#aaa; margin-bottom:8px;">Дистанция: ${o.distance} км</div>
                        <button class="btn-status btn-green" onclick="driverAcceptOrder(${o.id})">Принять заказ</button>
                    </div>
                `;
            });
        });

        function driverAcceptOrder(id) {
            currentActiveOrderId = id;
            socket.emit('accept_order', { orderId: id });
            document.getElementById('driver-radar-view').style.display = 'none';
            document.getElementById('driver-job-view').style.display = 'block';
            jobStage = 1;
        }

        // Изменение статуса заказа водителем (Яндекс таксометр)
        function changeJobStatus() {
            const btn = document.getElementById('job-action-btn');
            if(jobStage === 1) {
                socket.emit('update_status', { orderId: currentActiveOrderId, status: 'driver_here' });
                btn.innerText = "ПОЕХАЛИ";
                btn.className = "btn-status btn-green";
                document.getElementById('d-job-text').innerText = "Ожидание клиента...";
                jobStage = 2;
            } else if(jobStage === 2) {
                socket.emit('update_status', { orderId: currentActiveOrderId, status: 'in_progress' });
                btn.innerText = "ЗАВЕРШИТЬ ПОЕЗДКУ";
                btn.className = "btn-status btn-red";
                document.getElementById('d-job-text').innerText = "В пути с пассажиром...";
                jobStage = 3;
            } else if(jobStage === 3) {
                socket.emit('update_status', { orderId: currentActiveOrderId, status: 'finished' });
                alert("Поездка успешно завершена! Расчет наличными.");
                location.reload(); // Перезапускаем интерфейс для нового круга
            }
        }

        // Обновление статусов на экране пассажира
        socket.on('order_status_changed', (data) => {
            if(currentRole !== "passenger") return;
            const title = document.getElementById('p-status-title');
            const desc = document.getElementById('p-status-desc');

            if(data.status === 'accepted') {
                title.innerText = "Машина назначена! 🚖";
                desc.innerText = "Водитель принял заказ и направляется к вам.";
            } else if(data.status === 'driver_here') {
                title.innerText = "Машина подъехала! 🎉";
                desc.innerText = "Выходите, водитель ожидает вас у подъезда.";
                tg.HapticFeedback.notificationOccurred('success'); // Смартфон вибрирует!
            } else if(data.status === 'in_progress') {
                title.innerText = "В пути... 🛣";
                desc.innerText = "Приятной поездки на BATZ Такси!";
            } else if(data.status === 'finished') {
                alert("Спасибо за поездку на BATZ! Оцените водителя.");
                location.reload();
            }
        });

        function toggleRole() {
            const btn = document.getElementById('role-toggle-btn');
            const passPanel = document.getElementById('passenger-panel');
            const drivPanel = document.getElementById('driver-panel');

            if (currentRole === "passenger") {
                currentRole = "driver";
                btn.innerText = "РЕЖИМ: ВОДИТЕЛЬ";
                btn.style.background = "#28a745"; btn.style.color = "#fff";
                passPanel.style.display = "none"; drivPanel.style.display = "block";
                socket.emit('driver_ready');
            } else {
                currentRole = "passenger";
                btn.innerText = "РЕЖИМ: ПАССАЖИР";
                btn.style.background = "#ffcc00"; btn.style.color = "#000";
                passPanel.style.display = "block"; drivPanel.style.display = "none";
            }
        }
    </script>
</body>
</html>
